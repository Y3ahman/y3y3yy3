<!--
  FAVICON — public/favicon.svg
  ─────────────────────────────────────────────────────────────────────
  This SVG is used as the browser-tab icon (favours modern browsers).
  It is referenced in src/layouts/Layout.astro.

  HOW TO REPLACE THIS FAVICON
  ────────────────────────────
  Option A — Use your own SVG
    1. Open any vector editor (Figma, Illustrator, Inkscape, etc.)
    2. Export your icon as an SVG (ideally at a square viewBox, e.g. 32×32)
    3. Paste the contents here, replacing everything inside this file
    4. Save — Astro copies everything in /public to the build output as-is

  Option B — Use a PNG / ICO instead
    1. Drop your icon file into this /public folder
       (e.g. public/favicon.png or public/favicon.ico)
    2. Update the <link rel="icon"> line in src/layouts/Layout.astro:
         <link rel="icon" type="image/png" href="/favicon.png" />
    3. Delete this file if you no longer need the SVG version

  Option C — Generate a full icon set (recommended for production)
    Tools like https://realfavicongenerator.net/ or
    https://favicon.io/ can create every needed size from one source
    image. Drop the output files into /public and copy-paste the
    generated <link> tags into Layout.astro's <head>.
  ─────────────────────────────────────────────────────────────────────
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Apple-style rounded-rectangle background (slate-900) -->
  <rect width="32" height="32" rx="7" ry="7" fill="#0f172a"/>
  <!-- "Y" monogram — two diagonal arms meeting at centre, then a vertical stem -->
  <line x1="7"  y1="7"  x2="16" y2="17" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="25" y1="7"  x2="16" y2="17" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="16" y1="17" x2="16" y2="26" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
</svg>
